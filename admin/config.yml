# Decap CMS configuration for Jarksarn shop
# Auth: GitHub OAuth via self-hosted Cloudflare Worker (free, unlimited)
# Setup steps:
#   1. Deploy Sveltia CMS Auth Worker:
#      https://github.com/sveltia/sveltia-cms-auth → "Deploy to Cloudflare Workers" button
#   2. In Cloudflare Worker settings, set env vars:
#        GITHUB_CLIENT_ID     = your GitHub OAuth App Client ID
#        GITHUB_CLIENT_SECRET = your GitHub OAuth App Client Secret
#   3. Get Worker URL (e.g., https://sveltia-cms-auth.YOURNAME.workers.dev)
#   4. In GitHub OAuth App: update Authorization callback URL to {worker_url}/callback
#   5. Replace YOUR_WORKER_URL_HERE below with your Worker URL
#   6. Push commit → GitHub Pages auto-deploys
#   7. Visit https://no-project000.github.io/jarksarn-shop/admin/ → "Login with GitHub"

backend:
  name: github
  repo: no-project000/jarksarn-shop
  branch: main
  base_url: https://sveltia-cms-auth.kaweewat-chat.workers.dev
  auth_endpoint: auth

publish_mode: simple

# Where uploaded images are stored in the repo (relative to root)
media_folder: images/products
# Public URL prefix used to embed images in product pages (GH Pages serves from /jarksarn-shop/)
public_folder: /jarksarn-shop/images/products

collections:
  - name: catalog
    label: 'สินค้า (Catalog)'
    files:
      - file: data/products.json
        name: products
        label: 'รายการสินค้า — Products'
        fields:
          - name: products
            label: สินค้าทั้งหมด
            label_singular: สินค้า
            widget: list
            summary: '{{fields.th}}  ·  ฿{{fields.price}}  ({{fields.sku}})'
            fields:
              - { name: id, label: ID, widget: number, value_type: int, hint: เลขลำดับ unique ใช้ภายใน }
              - { name: sku, label: SKU, widget: string, hint: 'รูปแบบ JKS-XXXX' }
              - { name: th, label: 'ชื่อสินค้า (TH)', widget: string }
              - { name: en, label: 'Name (EN)', widget: string }
              - { name: price, label: 'ราคา (THB)', widget: number, value_type: int }
              - { name: was, label: 'ราคาก่อนลด (optional)', widget: number, value_type: int, required: false }
              - name: cat
                label: หมวด (Category)
                widget: select
                options:
                  - { label: 'ห้องนั่งเล่น (Living)', value: living }
                  - { label: 'ครัว & โต๊ะอาหาร (Kitchen)', value: kitchen }
                  - { label: 'กระเช้า & จัดเก็บ (Storage)', value: storage }
                  - { label: 'ของแต่งบ้าน (Accessories)', value: accessories }
              - name: subcat
                label: หัวข้อใหญ่ (Sub-category)
                widget: select
                hint: ต้องเลือกให้ตรงกับ Category ด้านบน (เช่น Living + Furniture)
                options:
                  # Living
                  - { label: 'Living · เฟอร์นิเจอร์', value: furniture }
                  - { label: 'Living · แสงสว่าง', value: lighting }
                  - { label: 'Living · ของแต่งห้อง', value: room-accents }
                  # Kitchen
                  - { label: 'Kitchen · งานสานบนโต๊ะ', value: on-table }
                  - { label: 'Kitchen · ถาดเสิร์ฟ', value: trays }
                  - { label: 'Kitchen · ตะกร้า', value: baskets }
                  # Storage
                  - { label: 'Storage · ตามขนาด', value: by-size }
                  - { label: 'Storage · ตามวัสดุ', value: by-material }
                  - { label: 'Storage · ตามการใช้', value: by-use }
                  # Accessories
                  - { label: 'Accessories · เครื่องแต่งกาย', value: carry }
                  - { label: 'Accessories · ของแต่งบ้าน', value: home-decor }
                  - { label: 'Accessories · ของขวัญ', value: gifting }
              - name: mat
                label: 'วัสดุ (Material)'
                widget: select
                options:
                  - { label: 'หวาย (Rattan)', value: rattan }
                  - { label: 'ไม้ไผ่ (Bamboo)', value: bamboo }
                  - { label: 'ผักตบชวา (Water hyacinth)', value: hyacinth }
                  - { label: 'กก (Sedge)', value: sedge }
              - name: tone
                label: เฉดสี (Tone)
                widget: select
                options: [Natural, Sand, Smoked, Bone, Rattan]
              - name: weave
                label: Placeholder pattern
                widget: select
                hint: ใช้แทนรูปจริง ถ้ายังไม่มีรูป (จะเปลี่ยนเป็นรูปจริงใน images ด้านล่าง)
                options: [weave-a, weave-b, weave-c, weave-d, weave-e, weave-f]
              - { name: opts, label: 'จำนวนตัวเลือก (size/tone variations)', widget: number, value_type: int }
              - name: badge
                label: 'Badge (optional)'
                widget: select
                options: ['', Bestseller, New, Limited]
                required: false
                default: ''
              - name: images
                label: รูปภาพ
                widget: list
                allow_add: true
                summary: '{{fields.image}}'
                fields:
                  - { name: image, label: 'รูป', widget: image }
